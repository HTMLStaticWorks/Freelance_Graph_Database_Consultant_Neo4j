<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Graph Intelligence Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, #111827 0%, #0a0f1c 100%); padding: 3rem 0; }
        .auth-card { width: 100%; max-width: 500px; padding: 3rem; border: 1px solid var(--glass-border); background: rgba(23, 32, 51, 0.6); backdrop-filter: blur(20px); border-radius: 30px; }
        .form-control { background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: #fff; padding: 12px 16px; }
        .form-control:focus { background: rgba(0,0,0,0.3); border-color: var(--electric-emerald); color: #fff; box-shadow: none; }
        .btn-graph { justify-content: center; }
        .social-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px; border: 1px solid var(--glass-border); border-radius: 12px; color: #fff; transition: var(--transition); }
        .social-btn:hover { background: rgba(255,255,255,0.05); }
        .auth-controls { position: absolute; top: 30px; right: 30px; display: flex; gap: 15px; }
        .eye-btn { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); }
        @media (max-width: 576px) {
            body { padding: 5rem 0 2rem; }
            .auth-card { width: 92%; padding: 2rem 1.5rem; border-radius: 20px; }
            .auth-controls { top: 20px; right: 20px; }
        }

        /* Light Mode Overrides */
        body.light-mode { background: radial-gradient(circle at center, #f8fafc 0%, #e2e8f0 100%); }
        body.light-mode .auth-card { background: rgba(255, 255, 255, 0.7); border-color: rgba(0, 0, 0, 0.1); }
        body.light-mode .text-white, body.light-mode h3 { color: #1e293b !important; }
        body.light-mode .form-control { background: rgba(255, 255, 255, 0.5); border-color: rgba(0, 0, 0, 0.1); color: #1e293b; }
        body.light-mode .form-control:focus { background: #fff; }
        body.light-mode .social-btn { border-color: rgba(0, 0, 0, 0.1); color: #1e293b; }
        body.light-mode .social-btn:hover { background: rgba(0,0,0,0.05); }
        .auth-card a:hover { color: var(--graph-teal) !important; }
    </style>
</head>
<body>

    <div class="auth-controls">
        <button class="btn btn-link theme-aware-text p-0" id="theme-toggle"><i class="bi bi-sun-fill"></i></button>
        <button class="btn btn-link theme-aware-text p-0" id="rtl-toggle"><i class="bi bi-arrow-left-right"></i></button>
    </div>

    <div class="auth-card text-center">
        <a href="index.html" class="navbar-brand mb-4 d-inline-block">
            <i class="bi bi-diagram-3-fill fs-2"></i>
            <span class="ms-2">NODALIS</span>
        </a>
        <h3 class="text-white mb-2">Create Account</h3>
        <p class="text-muted small mb-5">Start your journey with graph technology</p>

        <form>
            <div class="row g-3">
                <div class="col-12 text-start">
                    <label class="text-white mb-2 small">First Name</label>
                    <input type="text" class="form-control" placeholder="John">
                </div>
                <div class="col-12 text-start">
                    <label class="text-white mb-2 small">Last Name</label>
                    <input type="text" class="form-control" placeholder="Doe">
                </div>
                <div class="col-12 text-start">
                    <label class="text-white mb-2 small">Email Address</label>
                    <input type="email" class="form-control" placeholder="john@example.com">
                </div>
                <div class="col-12 text-start">
                    <label class="text-white mb-2 small">Password</label>
                    <div class="position-relative">
                        <input type="password" class="form-control" id="password" placeholder="••••••••">
                        <i class="bi bi-eye eye-btn" onclick="togglePassword()"></i>
                    </div>
                </div>
            </div>

            <div class="form-check text-start my-4 small">
                <input class="form-check-input" type="checkbox" id="terms">
                <label class="form-check-label text-muted" for="terms">I agree to the <a href="#" class="text-emerald">Terms & Conditions</a></label>
            </div>

            <button class="btn-graph btn-primary-graph w-100 py-3 mb-4">Create Account</button>

            <div class="text-muted small mb-4">Or continue with</div>

            <div class="d-flex gap-3 mb-4">
                <a href="#" class="social-btn">
                    <i class="bi bi-google"></i> Google
                </a>
                <a href="#" class="social-btn">
                    <i class="bi bi-apple"></i> Apple
                </a>
            </div>

            <p class="text-muted small mb-0">Already have an account? <a href="login.html" class="text-emerald">Login</a></p>
        </form>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            const eye = document.querySelector('.eye-btn');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                eye.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                pwd.type = 'password';
                eye.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Graph Intelligence Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body { height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, #111827 0%, #0a0f1c 100%); }
        .auth-card { width: 100%; max-width: 450px; padding: 3rem; border: 1px solid var(--glass-border); background: rgba(23, 32, 51, 0.6); backdrop-filter: blur(20px); border-radius: 30px; }
        .form-control { background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: #fff; padding: 12px 16px; }
        .form-control:focus { background: rgba(0,0,0,0.3); border-color: var(--electric-emerald); color: #fff; box-shadow: none; }
        .social-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px; border: 1px solid var(--glass-border); border-radius: 12px; color: #fff; transition: var(--transition); }
        .social-btn:hover { background: rgba(255,255,255,0.05); }
        .auth-controls { position: absolute; top: 30px; left: 30px; display: flex; gap: 15px; }
        .eye-btn { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); }
    </style>
</head>
<body>

    <div class="auth-controls">
        <button class="btn btn-link text-white p-0" id="theme-toggle"><i class="bi bi-sun-fill"></i></button>
        <button class="btn btn-link text-white p-0" id="rtl-toggle"><i class="bi bi-arrow-left-right"></i></button>
    </div>

    <div class="auth-card text-center">
        <a href="index.html" class="navbar-brand mb-4 d-inline-block">
            <i class="bi bi-diagram-3-fill fs-2"></i>
        </a>
        <h3 class="text-white mb-2">Welcome Back</h3>
        <p class="text-muted small mb-5">Access your graph intelligence ecosystem</p>

        <form>
            <div class="text-start mb-3">
                <label class="text-white mb-2 small">Email Address</label>
                <input type="email" class="form-control" placeholder="admin@graphintel.io">
            </div>
            <div class="text-start mb-4 position-relative">
                <label class="text-white mb-2 small">Password</label>
                <input type="password" class="form-control" id="password" placeholder="••••••••">
                <i class="bi bi-eye eye-btn" onclick="togglePassword()"></i>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4 small">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember">
                    <label class="form-check-label text-muted" for="remember">Remember me</label>
                </div>
                <a href="#" class="text-emerald">Forgot Password?</a>
            </div>

            <button class="btn-graph btn-primary-graph w-100 py-3 mb-4">Login to Console</button>

            <div class="text-muted small mb-4">Or continue with</div>

            <div class="d-flex gap-3 mb-4">
                <a href="#" class="social-btn">
                    <i class="bi bi-google"></i> Google
                </a>
                <a href="#" class="social-btn">
                    <i class="bi bi-apple"></i> Apple
                </a>
            </div>

            <p class="text-muted small mb-0">Don't have an account? <a href="register.html" class="text-emerald">Register</a></p>
        </form>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            const eye = document.querySelector('.eye-btn');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                eye.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                pwd.type = 'password';
                eye.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }
    </script>
</body>
</html>
